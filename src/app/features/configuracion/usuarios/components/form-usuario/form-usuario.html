<form [formGroup]="form" class="usuario-form" (ngSubmit)="onSubmit()">
    <div class="row">
        <div class="form-row">
            <p-floatlabel>
                <input pInputText id="username" formControlName="username" placeholder=" " [class.p-invalid]="form.get('username')?.invalid && form.get('username')?.touched" />
                <label for="username">Usuario <span class="required">*</span></label>
            </p-floatlabel>
        </div>
        <div class="form-row">
            <p-floatlabel>
                <input pInputText id="email" formControlName="email" type="email" placeholder=" " [class.p-invalid]="form.get('email')?.invalid && form.get('email')?.touched" />
                <label for="email">Correo Electrónico <span class="required">*</span></label>
            </p-floatlabel>
        </div>
    </div>

    <div class="row">
        <div class="form-row">
            <p-floatlabel>
                <input pInputText id="nombres" formControlName="nombres" placeholder=" " [class.p-invalid]="form.get('nombres')?.invalid && form.get('nombres')?.touched" />
                <label for="nombres">Nombres <span class="required">*</span></label>
            </p-floatlabel>
        </div>
        <div class="form-row">
            <p-floatlabel>
                <input pInputText id="apellidos" formControlName="apellidos" placeholder=" " [class.p-invalid]="form.get('apellidos')?.invalid && form.get('apellidos')?.touched" />
                <label for="apellidos">Apellidos <span class="required">*</span></label>
            </p-floatlabel>
        </div>
    </div>

    <div class="row">
        <div class="form-row">
            <p-floatlabel>
                <p-select [options]="documentTypes()" formControlName="tipoDocumento" optionLabel="name" optionValue="code" placeholder=" " styleClass="w-full" (onChange)="onDocumentTypeChange($event.value)"></p-select>
                <label for="tipoDocumento">Tipo Doc. <span class="required">*</span></label>
            </p-floatlabel>
        </div>
        <div class="form-row">
            <p-floatlabel>
                <input pInputText id="nroDocumento" formControlName="nroDocumento" placeholder=" " [class.p-invalid]="form.get('nroDocumento')?.invalid && form.get('nroDocumento')?.touched" />
                <label for="nroDocumento">Núm. Doc. <span class="required">*</span></label>
            </p-floatlabel>
        </div>
    </div>

    <div class="row">
        <div class="form-row">
            <p-floatlabel>
                <input pInputText id="telefono" formControlName="telefono" placeholder=" " [class.p-invalid]="form.get('telefono')?.invalid && form.get('telefono')?.touched" />
                <label for="telefono">Teléfono</label>
            </p-floatlabel>
        </div>
        <div class="form-row">
            <p-floatlabel>
                <p-password formControlName="password" [toggleMask]="true" [feedback]="false" styleClass="w-full" inputStyleClass="w-full" placeholder=" " [class.p-invalid]="form.get('password')?.invalid && form.get('password')?.touched">
                </p-password>
                <label for="password">Contraseña {{ !isEditMode() ? '*' : '' }}</label>
            </p-floatlabel>
            @if (isEditMode()) {
            <small class="form-hint">Dejar vacío para mantener la actual</small>
            }
        </div>
    </div>

    @if (data()) {
    <div class="row">
        <div class="form-row">
            <div class="status-container">
                <div class="status-info">
                    <span class="status-label">Estado</span>
                    <span class="status-text">{{ form.get('activo')?.value ? 'Activo' : 'Inactivo' }}</span>
                </div>
                <p-toggleswitch formControlName="activo"></p-toggleswitch>
            </div>
        </div>
    </div>
    }
</form>
